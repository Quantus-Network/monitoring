apiVersion: 1

policies:
  - orgId: 1
    receiver: Rocket Notifications # Default: non-critical → Rocket
    group_by: ["alertname", "grafana_folder", "instance"]
    group_wait: 30s
    group_interval: 5m
    # Effectively notify once until resolved; re-notify only after resolve → fire again
    repeat_interval: 8736h
    routes:
      # 🔴 CRITICAL — Email only (server/service down, disk full, etc.)
      # No New Blocks also gets Telegram as the highest-priority business alert

      # Dirac — No New Blocks → Email + Telegram
      - receiver: Email Notifications
        matchers:
          - chain = dirac
          - severity = critical
          - alertname = "No New Blocks"
        group_by: ["alertname", "chain"]
        group_wait: 2m
        repeat_interval: 8736h
        continue: true

      - receiver: Telegram Notifications
        matchers:
          - chain = dirac
          - severity = critical
          - alertname = "No New Blocks"
        group_by: ["alertname", "chain"]
        group_wait: 2m
        repeat_interval: 8736h
        continue: false

      # Dirac — other critical → Email only
      - receiver: Email Notifications
        matchers:
          - chain = dirac
          - severity = critical
        group_wait: 2m
        repeat_interval: 8736h
        continue: false

      # Dirac — non-critical → Rocket
      - receiver: Rocket Notifications
        matchers:
          - chain = dirac
        group_wait: 2m
        repeat_interval: 8736h
        continue: false

      # Planck — No New Blocks → Email + Telegram
      - receiver: Email Notifications
        matchers:
          - chain = planck
          - severity = critical
          - alertname = "No New Blocks"
        group_by: ["alertname", "chain"]
        group_wait: 2m
        repeat_interval: 8736h
        continue: true

      - receiver: Telegram Notifications
        matchers:
          - chain = planck
          - severity = critical
          - alertname = "No New Blocks"
        group_by: ["alertname", "chain"]
        group_wait: 2m
        repeat_interval: 8736h
        continue: false

      # Planck — other critical → Email only
      - receiver: Email Notifications
        matchers:
          - chain = planck
          - severity = critical
        group_wait: 2m
        repeat_interval: 8736h
        continue: false

      # Planck — non-critical → Rocket
      - receiver: Rocket Notifications
        matchers:
          - chain = planck
        group_wait: 2m
        repeat_interval: 8736h
        continue: false

      # Heisenberg — critical → Email; otherwise Rocket
      - receiver: Email Notifications
        matchers:
          - chain = heisenberg
          - severity = critical
        group_wait: 10m
        repeat_interval: 8736h
        continue: false

      - receiver: Rocket Notifications
        matchers:
          - chain = heisenberg
        group_wait: 10m
        repeat_interval: 8736h
        continue: false

      # GENERIC (no chain label)
      # No New Blocks → Email + Telegram
      - receiver: Email Notifications
        matchers:
          - severity = critical
          - alertname = "No New Blocks"
        group_by: ["alertname"]
        group_wait: 10s
        repeat_interval: 8736h
        continue: true

      - receiver: Telegram Notifications
        matchers:
          - severity = critical
          - alertname = "No New Blocks"
        group_by: ["alertname"]
        group_wait: 10s
        repeat_interval: 8736h
        continue: false

      # Other critical → Email only
      - receiver: Email Notifications
        matchers:
          - severity = critical
        group_wait: 10s
        repeat_interval: 8736h
        continue: false

      # Warnings / non-critical → Rocket
      - receiver: Rocket Notifications
        matchers:
          - severity = warning
        group_wait: 30s
        repeat_interval: 8736h
        continue: false
