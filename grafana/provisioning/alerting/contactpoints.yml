apiVersion: 1

contactPoints:
  - orgId: 1
    name: Email Notifications
    receivers:
      - uid: email-contact-point
        type: email
        settings:
          # Email addresses from environment variable ALERT_EMAIL_ADDRESSES
          addresses: ${ALERT_EMAIL_ADDRESSES}
          singleEmail: false
        disableResolveMessage: false
  
  - orgId: 1
    name: Telegram Notifications
    receivers:
      - uid: telegram-contact-point
        type: telegram
        settings:
          # Telegram Bot Token and Chat ID from environment variables
          bottoken: ${TELEGRAM_BOT_TOKEN}
          chatid: "${TELEGRAM_CHAT_ID}"
          message: |
            {{ range .Alerts -}}
            🚨 *{{ .Labels.alertname }}* — {{ .Status | toUpper }}
            {{- if .Labels.severity }}
            *Severity:* {{ .Labels.severity }}
            {{- end }}
            {{- if .Labels.chain }}
            *Chain:* {{ .Labels.chain }}
            {{- end }}
            {{- if .Labels.instance }}
            *Instance:* {{ .Labels.instance }}
            {{- end }}
            {{- if .Annotations.summary }}

            📋 {{ .Annotations.summary }}
            {{- end }}
            {{- if .Annotations.description }}
            {{ .Annotations.description }}
            {{- end }}
            {{- if .GeneratorURL }}

            🔗 [View in Grafana]({{ .GeneratorURL }}){{ if .SilenceURL }} · [Silence]({{ .SilenceURL }}){{ end }}
            {{- else if .SilenceURL }}

            🔗 [Silence]({{ .SilenceURL }})
            {{- end }}
            {{ end -}}
          parse_mode: Markdown
        disableResolveMessage: false

  - orgId: 1
    name: Rocket Notifications
    receivers:
      - uid: rocket-contact-point
        type: slack
        settings:
          url: ${ROCKET_WEBHOOK_URL}
          username: Grafana Monitor
          text: |
            {{ range .Alerts -}}
            🚨 *{{ .Labels.alertname }}* — {{ .Status | toUpper }}
            {{- if .Labels.severity }}
            *Severity:* {{ .Labels.severity }}
            {{- end }}
            {{- if .Labels.chain }}
            *Chain:* {{ .Labels.chain }}
            {{- end }}
            {{- if .Labels.instance }}
            *Instance:* {{ .Labels.instance }}
            {{- end }}
            {{- if .Annotations.summary }}

            📋 {{ .Annotations.summary }}
            {{- end }}
            {{- if .Annotations.description }}
            {{ .Annotations.description }}
            {{- end }}
            {{- if .GeneratorURL }}

            🔗 [View in Grafana]({{ .GeneratorURL }}){{ if .SilenceURL }} · [Silence]({{ .SilenceURL }}){{ end }}
            {{- else if .SilenceURL }}

            🔗 [Silence]({{ .SilenceURL }})
            {{- end }}
            {{ end -}}
        disableResolveMessage: false
